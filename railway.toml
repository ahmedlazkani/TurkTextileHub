# ===================================================
# railway.toml
# ملف إعداد Railway للنشر الدائم للبوت TurkTextileHub
# يُحدد طريقة البناء وأمر التشغيل وسياسة إعادة التشغيل
# KAYISOFT - إسطنبول، تركيا
# ===================================================

[build]
# استخدام Dockerfile لبناء البيئة (يتوافق مع railway.json)
builder = "dockerfile"

[deploy]
# أمر تشغيل البوت — FastAPI هو الـ main process، البوت يعمل كـ background task
startCommand = "python -m bot.main"
# إعادة التشغيل عند الفشل فقط (وليس عند الإيقاف المتعمد)
restartPolicyType = "on_failure"
# الحد الأقصى لمحاولات إعادة التشغيل التلقائي
restartPolicyMaxRetries = 10
# منع تشغيل أكثر من نسخة واحدة من البوت في نفس الوقت
numReplicas = 1
# إخبار Railway بأن التطبيق يستمع على PORT (يُستخدم للـ health check)
healthcheckPath = "/health"
